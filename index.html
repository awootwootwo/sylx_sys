<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Explorer</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --border-color: #d0d7de;
            --link-color: #0969da;
            --text-main: #1f2328;
            --hover-bg: #f3f4f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(31,35,40,0.12);
            overflow: hidden;
        }

        /* Header & Breadcrumbs */
        .header {
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
        }

        .repo-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .breadcrumbs {
            display: flex;
            gap: 4px;
            font-size: 14px;
            color: var(--link-color);
            align-items: center;
        }

        .breadcrumbs span {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .breadcrumbs span:hover {
            text-decoration: underline;
            background: var(--hover-bg);
        }

        .breadcrumbs .current {
            color: var(--text-main);
            font-weight: 400;
            cursor: default;
        }

        .breadcrumbs .current:hover {
            text-decoration: none;
            background: none;
        }

        /* File List */
        .file-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .file-item {
            display: grid;
            grid-template-columns: 30px 1fr 120px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #eff1f3;
            cursor: pointer;
            transition: background 0.1s;
        }

        .file-item:last-child { border-bottom: none; }

        .file-item:hover {
            background-color: var(--hover-bg);
        }

        .icon { font-size: 18px; }
        .file-name { font-size: 14px; color: var(--text-main); }
        .file-type { font-size: 12px; color: #636c76; text-align: right; }

        .loading {
            padding: 40px;
            text-align: center;
            color: #636c76;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="repo-title" id="repo-name">Loading Repository...</div>
        <div class="breadcrumbs" id="breadcrumbs"></div>
    </div>
    <div id="explorer-body">
        <div class="loading">Fetching data from GitHub...</div>
    </div>
</div>

<script>
    // Configuration - Change these to target any public repo
    const CONFIG = {
        owner: 'microsoft',
        repo: 'vscode',
        branch: 'main'
    };

    let currentPath = [];

    async function fetchContents(pathArray = []) {
        const pathString = pathArray.join('/');
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${pathString}`;
        
        const body = document.getElementById('explorer-body');
        body.innerHTML = '<div class="loading">Loading...</div>';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Repo not found or API limit reached');
            
            const data = await response.json();
            renderUI(data);
            renderBreadcrumbs(pathArray);
            document.getElementById('repo-name').innerText = `${CONFIG.owner} / ${CONFIG.repo}`;
        } catch (err) {
            body.innerHTML = `<div class="loading" style="color: red;">Error: ${err.message}</div>`;
        }
    }

    function renderUI(files) {
        const body = document.getElementById('explorer-body');
        const list = document.createElement('div');
        list.className = 'file-list';

        // Sort: Folders first, then files
        files.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));

        files.forEach(file => {
            const item = document.createElement('div');
            item.className = 'file-item';
            
            const isDir = file.type === 'dir';
            const icon = isDir ? '📁' : '📄';

            item.innerHTML = `
                <span class="icon">${icon}</span>
                <span class="file-name">${file.name}</span>
                <span class="file-type">${isDir ? 'Directory' : 'File'}</span>
            `;

            item.onclick = () => {
                if (isDir) {
                    currentPath.push(file.name);
                    fetchContents(currentPath);
                } else {
                    window.open(file.html_url, '_blank');
                }
            };

            list.appendChild(item);
        });

        body.innerHTML = '';
        body.appendChild(list);
    }

    function renderBreadcrumbs(pathArray) {
        const container = document.getElementById('breadcrumbs');
        container.innerHTML = '<span onclick="navigateToStep(-1)">root</span>';

        pathArray.forEach((folder, index) => {
            const separator = document.createElement('b');
            separator.innerText = ' / ';
            separator.style.color = '#d0d7de';
            
            const span = document.createElement('span');
            span.innerText = folder;
            
            if (index === pathArray.length - 1) {
                span.className = 'current';
            } else {
                span.onclick = () => navigateToStep(index);
            }

            container.appendChild(separator);
            container.appendChild(span);
        });
    }

    function navigateToStep(index) {
        // -1 returns to root, 0 returns to first folder, etc.
        currentPath = currentPath.slice(0, index + 1);
        fetchContents(currentPath);
    }

    // Initial load
    fetchContents();
</script>

</body>
</html>
