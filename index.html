<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylx_Sys Repository Navigator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .navigator-card {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .repo-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .repo-badge {
            background: #eff6ff;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .breadcrumb-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #64748b;
        }

        .breadcrumb-item {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover { color: var(--primary); text-decoration: underline; }
        .breadcrumb-current { color: var(--text); font-weight: 600; }

        .file-grid {
            padding: 10px;
            min-height: 300px;
        }

        .file-row {
            display: grid;
            grid-template-columns: 40px 1fr 100px;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        .file-row:hover { background: #f1f5f9; }
        .file-row:last-child { border-bottom: none; }

        .icon { font-size: 20px; display: flex; justify-content: center; }
        .name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .type-label { font-size: 11px; text-transform: uppercase; color: #94a3b8; text-align: right; letter-spacing: 0.5px; }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #94a3b8;
        }

        .btn-back {
            background: none;
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.2s;
        }

        .btn-back:hover { background: #f8fafc; border-color: #cbd5e1; }
    </style>
</head>
<body>

<div class="navigator-card">
    <div class="header">
        <div class="repo-info">
            <span class="repo-badge">GitHub Repository</span>
            <strong id="repo-title">awootwootwo / sylx_sys</strong>
        </div>
        <div class="breadcrumb-container">
            <button class="btn-back" onclick="goBack()" id="back-btn" style="display:none;">← Back</button>
            <div id="breadcrumbs"></div>
        </div>
    </div>

    <div id="file-viewer" class="file-grid">
        </div>
</div>

<script>
    const REPO_OWNER = 'awootwootwo';
    const REPO_NAME = 'sylx_sys';
    let pathHistory = [];

    async function loadDirectory(pathArr = []) {
        const pathString = pathArr.join('/');
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${pathString}`;
        const viewer = document.getElementById('file-viewer');
        
        viewer.innerHTML = `<div class="loading-state">Scanning repository...</div>`;
        document.getElementById('back-btn').style.display = pathArr.length > 0 ? 'block' : 'none';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Could not fetch data');
            const data = await response.json();
            
            renderFiles(data);
            renderBreadcrumbs(pathArr);
        } catch (err) {
            viewer.innerHTML = `<div class="loading-state" style="color: #ef4444;">Failed to load repository contents.</div>`;
        }
    }

    function renderFiles(items) {
        const viewer = document.getElementById('file-viewer');
        viewer.innerHTML = '';

        // Sort: Folders first
        items.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));

        items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'file-row';
            
            const isFolder = item.type === 'dir';
            const icon = isFolder ? '📁' : '📄';

            row.innerHTML = `
                <div class="icon">${icon}</div>
                <div class="name">${item.name}</div>
                <div class="type-label">${isFolder ? 'Folder' : 'File'}</div>
            `;

            row.onclick = () => {
                if (isFolder) {
                    pathHistory.push(item.name);
                    loadDirectory(pathHistory);
                } else {
                    window.open(item.html_url, '_blank');
                }
            };
            viewer.appendChild(row);
        });
    }

    function renderBreadcrumbs(pathArr) {
        const container = document.getElementById('breadcrumbs');
        container.innerHTML = `<span class="breadcrumb-item" onclick="jumpTo(-1)">root</span>`;

        pathArr.forEach((folder, index) => {
            container.innerHTML += ` <span style="opacity:0.5">/</span> `;
            if (index === pathArr.length - 1) {
                container.innerHTML += `<span class="breadcrumb-current">${folder}</span>`;
            } else {
                container.innerHTML += `<span class="breadcrumb-item" onclick="jumpTo(${index})">${folder}</span>`;
            }
        });
    }

    function jumpTo(index) {
        pathHistory = pathHistory.slice(0, index + 1);
        loadDirectory(pathHistory);
    }

    function goBack() {
        pathHistory.pop();
        loadDirectory(pathHistory);
    }

    // Initial Start
    loadDirectory();
</script>

</body>
</html>
